spring:
  application:
    name: error
  mvc:
    problem-details:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  probe-control:
    token: ${PROBE_CONTROL_TOKEN:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] [%thread] %logger - %msg%n%ex{short}"