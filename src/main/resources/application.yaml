spring:
  application:
    name: error
  mvc:
    problem-details:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      # 确保 DOWN 时返回非 2xx；kube 探针把 200–399 当成功，仅 body 为 DOWN 不会重启 Pod
      status:
        http-mapping:
          DOWN: 503
          OUT_OF_SERVICE: 503

app:
  probe-control:
    token: ${PROBE_CONTROL_TOKEN:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] [%thread] %logger - %msg%n%ex{short}"