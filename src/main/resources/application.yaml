spring:
  application:
    name: error
  mvc:
    problem-details:
      enabled: true

# OpenShift / Kubernetes：探针建议指向下方路径；本地也可直接 curl 验证
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

# 探针测试 API（/api/probe/**）：生产环境请设置 token 并要求请求头 X-Probe-Control-Token
app:
  probe-control:
    token: ${PROBE_CONTROL_TOKEN:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [requestId:%X{requestId:-}] [%thread] %logger{36} - %msg%n"